services:
  db:
    image: postgres:15-alpine
    container_name: pgym-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: northwind
    ports:
      - "5432:5432"
    volumes:
      - ./backend/init:/docker-entrypoint-initdb.d
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pgym-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - app_data:/data
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/pgym
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pgym-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
  app_data:
